<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mot de passe oublié - Smart Irrigation</title>
    <style>
        body { font-family: Arial; background: #e6e6e6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e68a00; }
        a { color: #555; text-decoration: none; font-size: 14px; display: inline-block; margin-top: 15px;}
        a:hover { color: #ff9800; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Mot de passe oublié</h2>
        <p style="font-size: 13px; color: #666;">Entrez votre nom d'utilisateur pour créer un nouveau mot de passe.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="padding: 10px; margin-bottom: 15px; border-radius: 4px; font-size: 13px; font-weight: bold; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Votre nom d'utilisateur" required>
            <input type="password" name="new_password" placeholder="Nouveau mot de passe" required>
            <button type="submit">Changer le mot de passe</button>
        </form>
        
        <a href="/login">Retour à la page de connexion</a>
    </div>
</body>
</html>
